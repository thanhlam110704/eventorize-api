services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    image: eventorize-api:latest
    restart: always
    env_file:
      - .env/prod.env
      - .env/db.env
    command: uvicorn main:app --host 0.0.0.0 --port ${PORT}
    volumes:
      - ./logs/:/opt/projects/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/v1/health/ping"]
      interval: 60s
      timeout: 3s
      retries: 3
    depends_on:
      - db
