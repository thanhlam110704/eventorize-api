services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    env_file:
      - ./.env/dev.env
    ports:
      - 8000:8000
    depends_on:
      - db

  db:
    image: mongo
    restart: always
    volumes:
      - ./database:/data/db
    ports:
      - 27017:27017
