services:
  api:
    build: ./app
    restart: always
    command: sh -c 'uvicorn main:app --reload --workers 1 --host 0.0.0.0 --port ${PORT:-8000}'
    volumes:
      - ./app/:/opt/projects/app/
      - ./logs/:/opt/projects/app/logs
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - ./.env/dev.env
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -s -f http://localhost:10000/v1/health/ping || exit 1"]
      interval: 60s
      timeout: 3s
      retries: 3
    depends_on:
      - db

  db:
    image: mongo
    restart: always
    volumes:
      - ./database:/data/db
    command: --quiet
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand({serverStatus:1}).ok' | mongosh admin --quiet | grep 1
      interval: 60s
      timeout: 60s
      retries: 6