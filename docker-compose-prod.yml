version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      - PORT=${PORT}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - db

  db:
    image: mongo
    volumes:
      - mongo_data:/data/db
    command: --quiet

volumes:
  mongo_data: